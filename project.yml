name: NextZen
options:
  bundleIdPrefix: com.example
  developmentLanguage: en
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.nextzen
    PRODUCT_NAME: NextZen
    SWIFT_VERSION: 5
    MARKETING_VERSION: 1
    CURRENT_PROJECT_VERSION: 1
    SUPPORTED_PLATFORMS: iphoneos iphonesimulator
    TARGETED_DEVICE_FAMILY: '1'
    SUPPORTS_MACCATALYST: 'NO'
    ALWAYS_SEARCH_USER_PATHS: 'NO'
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  NextZen:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    entitlements:
      path: NextZen/NextZen.entitlements
    sources:
      - path: NextZen
    info:
      path: NextZen/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: 6
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "NextZen uses your camera to scan barcodes and capture item photos."
        NSPhotoLibraryUsageDescription: "NextZen needs access to your photos to attach images to items."
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: supabase-swift
        product: Supabase
      - package: purchases-ios
        product: RevenueCat
      - package: purchases-ios
        product: RevenueCatUI
schemes:
  NextZen:
    build:
      targets:
        NextZen: all
    run:
      config: Debug
    archive:
      config: Release
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  purchases-ios:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
